<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intake Shifts - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; min-height: 100vh; padding: 12px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { margin-bottom: 15px; }
        .header h1 { font-size: 20px; font-weight: 700; }
        
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .nav-tab {
            padding: 8px 16px; background: #1a1a1a; border: none; color: #888;
            font-size: 13px; font-weight: 500; cursor: pointer; border-radius: 6px; text-decoration: none;
        }
        .nav-tab:hover { background: #2a2a2a; color: #fff; }
        .nav-tab.active { background: #5BA4B5; color: #fff; }
        
        .card { background: #1a1a1a; padding: 15px; border-radius: 8px; }
        .card h3 { font-size: 15px; margin-bottom: 8px; }
        .card p { font-size: 12px; color: #888; margin-bottom: 12px; line-height: 1.4; }
        
        .message { padding: 10px; border-radius: 6px; margin-bottom: 12px; font-size: 13px; }
        .message.success { background: #065f46; color: #6ee7b7; }
        .message.error { background: #7f1d1d; color: #fca5a5; }
        
        /* Specialist list */
        .specialist-list { display: flex; flex-direction: column; gap: 1px; background: #333; border-radius: 6px; overflow: hidden; }
        
        .specialist-row {
            display: grid;
            grid-template-columns: 1fr auto auto auto;
            gap: 8px;
            align-items: center;
            padding: 10px 12px;
            background: #111;
        }
        .specialist-row.is-off { background: #1a1a1a; }
        .specialist-row.is-off .spec-name { color: #666; }
        .specialist-row.is-off .spec-times { opacity: 0.3; }
        
        .spec-name { 
            font-size: 13px; 
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .spec-times {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .spec-times input {
            width: 70px;
            padding: 6px;
            font-size: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            text-align: center;
        }
        .spec-times span { color: #666; font-size: 11px; }
        
        .spec-hours {
            font-size: 12px;
            font-weight: 600;
            color: #5BA4B5;
            min-width: 35px;
            text-align: center;
        }
        .spec-hours.off { color: #ef4444; }
        
        .spec-actions {
            display: flex;
            gap: 4px;
        }
        
        .btn-off {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-off.working { background: #2a2a2a; color: #888; }
        .btn-off.working:hover { background: #7f1d1d; color: #fca5a5; }
        .btn-off.is-off { background: #4ade80; color: #000; }
        .btn-off.is-off:hover { background: #22c55e; }
        
        .btn-deactivate {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            background: #2a2a2a;
            color: #888;
        }
        .btn-deactivate:hover { background: #7f1d1d; color: #fca5a5; }
        
        /* Header row */
        .list-header {
            display: grid;
            grid-template-columns: 1fr auto auto auto;
            gap: 8px;
            padding: 8px 12px;
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Total row */
        .total-row {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: #111;
            font-size: 13px;
            font-weight: 600;
        }
        .total-row .hours { color: #5BA4B5; }
        
        /* Inactive section */
        .inactive-section { margin-top: 20px; }
        .inactive-section h4 { font-size: 12px; color: #666; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .inactive-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #111;
            border-radius: 4px;
            margin-bottom: 4px;
        }
        .inactive-row .name { font-size: 13px; color: #666; }
        .btn-reactivate {
            padding: 5px 12px;
            border: none;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            background: #065f46;
            color: #6ee7b7;
        }
        .btn-reactivate:hover { background: #047857; }
        
        .empty { text-align: center; padding: 30px; color: #666; font-size: 13px; }
        
        .section { display: block; }
        
        /* Date nav */
        .date-nav { display: flex; gap: 8px; margin-bottom: 15px; align-items: center; flex-wrap: wrap; }
        .date-nav button { padding: 8px 12px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .date-nav button:hover { background: #2a2a2a; }
        .date-nav input[type="date"] { padding: 8px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 4px; font-size: 14px; }
        
        /* Add shift form */
        .add-shift-form { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #333; }
        .add-shift-form select { flex: 1; min-width: 150px; padding: 8px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 4px; font-size: 13px; }
        .add-shift-form input[type="time"] { width: 90px; padding: 8px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 4px; font-size: 13px; }
        .add-shift-form span { color: #666; }
        .btn-add { padding: 8px 16px; background: #4ade80; color: #000; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; }
        .btn-add:hover { background: #22c55e; }
        .btn-off-day { padding: 8px 12px; background: #ef4444; color: #fff; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 12px; }
        .btn-off-day:hover { background: #dc2626; }
        .btn-apply-defaults { padding: 10px 16px; background: #5BA4B5; color: #fff; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; width: 100%; }
        .btn-apply-defaults:hover { background: #4a8a9a; }
        
        /* Daily shift row */
        .daily-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: #111; border-radius: 4px; margin-bottom: 4px; }
        .daily-row .name { font-size: 13px; font-weight: 500; flex: 1; }
        .daily-row .times { font-size: 12px; color: #5BA4B5; margin-right: 10px; }
        .daily-row .times.off { color: #ef4444; }
        .daily-row .delete { background: none; border: none; color: #666; cursor: pointer; font-size: 14px; padding: 4px 8px; }
        .daily-row .delete:hover { color: #ef4444; }
        .daily-off-btn { padding: 4px 10px; border: none; border-radius: 4px; font-size: 10px; font-weight: 600; cursor: pointer; background: #2a2a2a; color: #888; margin-right: 5px; }
        .daily-off-btn:hover { background: #7f1d1d; color: #fca5a5; }
        .daily-off-btn.is-on { background: #4ade80; color: #000; }
        .daily-off-btn.is-on:hover { background: #22c55e; }
        
        @media (max-width: 480px) {
            .specialist-row {
                grid-template-columns: 1fr auto;
                gap: 6px;
            }
            .spec-name { grid-column: 1; }
            .spec-times { grid-column: 1 / -1; grid-row: 2; }
            .spec-hours { grid-column: 2; grid-row: 1; }
            .spec-actions { grid-column: 1 / -1; grid-row: 3; justify-content: flex-end; }
            .spec-times input { width: 80px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Intake Shift Manager</h1>
        </div>
        
        <div class="nav-tabs">
            <a href="index.html" class="nav-tab">📊 Dashboard</a>
            <button class="nav-tab" onclick="showSection('daily')" id="tab-daily">📅 Daily Shifts</button>
            <button class="nav-tab active" onclick="showSection('defaults')" id="tab-defaults">⚙️ Defaults</button>
        </div>
        
        <div id="message"></div>
        
        <!-- Daily Shifts Section -->
        <div id="section-daily" class="section" style="display:none;">
            <div class="date-nav">
                <button onclick="changeDate(-1)">←</button>
                <input type="date" id="shiftDate" onchange="loadDailyShifts()">
                <button onclick="changeDate(1)">→</button>
                <button onclick="setToday()">Today</button>
            </div>
            
            <div class="card">
                <h3>Shift Overrides for <span id="dateLabel"></span></h3>
                <p>Add exceptions to the default schedule for this specific day.</p>
                
                <div class="add-shift-form">
                    <select id="addSpecialist"></select>
                    <input type="time" id="addStart" value="09:00">
                    <span>-</span>
                    <input type="time" id="addEnd" value="17:00">
                    <button class="btn-add" onclick="addDailyShift()">Add</button>
                    <button class="btn-off-day" onclick="addOffDay()">+ OFF</button>
                </div>
                <div style="margin-bottom:15px;">
                    <button class="btn-apply-defaults" onclick="applyDefaults()">Apply All Defaults</button>
                </div>
                
                <div id="dailyContainer"><div class="empty">Loading...</div></div>
            </div>
        </div>
        
        <!-- Default Schedules Section -->
        <div id="section-defaults" class="section">
            <div class="card">
                <h3>Default Weekly Schedules (Mon-Fri)</h3>
                <p>Set default hours for each specialist. Click <strong>OFF</strong> to mark as not working.</p>
                <div id="defaultsContainer"><div class="empty">Loading...</div></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ymhhdipaplhzxpfhrunp.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_f_3vIV-VzDkK9UPxmDx1Sw_UXZ78iJq';
        
        let defaults = [];
        let inactiveDefaults = [];
        
        async function supabase(endpoint, options = {}) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, {
                ...options,
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': options.method === 'POST' ? 'return=representation' : (options.method === 'PATCH' ? 'return=representation' : 'return=minimal'),
                    ...options.headers
                }
            });
            if (!res.ok) throw new Error(await res.text());
            const text = await res.text();
            return text ? JSON.parse(text) : null;
        }
        
        async function loadDefaults() {
            try {
                const allDefaults = await supabase('default_shifts?day_of_week=is.null&order=specialist_name');
                const allSpecialists = await supabase('intake_specialists?select=email,is_active');
                
                const activeMap = {};
                (allSpecialists || []).forEach(s => { activeMap[s.email] = s.is_active !== false; });
                
                defaults = [];
                inactiveDefaults = [];
                
                (allDefaults || []).forEach(d => {
                    if (activeMap[d.specialist_email] !== false) {
                        defaults.push(d);
                    } else {
                        inactiveDefaults.push(d);
                    }
                });
                
                renderDefaults();
                return true;
            } catch (e) {
                console.error('Failed to load:', e);
                showMessage('Error loading: ' + e.message, 'error');
                return false;
            }
        }
        
        function formatTime(t) { return t ? t.substring(0, 5) : '09:00'; }
        
        function calcHours(start, end) {
            const [sh, sm] = start.split(':').map(Number);
            const [eh, em] = end.split(':').map(Number);
            return ((eh * 60 + em) - (sh * 60 + sm)) / 60;
        }
        
        function renderDefaults() {
            if (!defaults.length) {
                document.getElementById('defaultsContainer').innerHTML = '<div class="empty">No schedules configured</div>';
                return;
            }
            
            let totalHours = 0, workingCount = 0;
            
            const rows = defaults.map(d => {
                const isOff = d.is_off === true;
                const start = formatTime(d.start_time);
                const end = formatTime(d.end_time);
                const hours = isOff ? 0 : calcHours(start, end);
                
                if (!isOff) { totalHours += hours; workingCount++; }
                
                return `
                <div class="specialist-row ${isOff ? 'is-off' : ''}" data-id="${d.id}">
                    <div class="spec-name">${d.specialist_name}</div>
                    <div class="spec-times">
                        <input type="time" value="${start}" onchange="updateShift(${d.id})">
                        <span>-</span>
                        <input type="time" value="${end}" onchange="updateShift(${d.id})">
                    </div>
                    <div class="spec-hours ${isOff ? 'off' : ''}">${isOff ? 'OFF' : hours.toFixed(1) + 'h'}</div>
                    <div class="spec-actions">
                        <button class="btn-off ${isOff ? 'is-off' : 'working'}" onclick="toggleOff(${d.id}, ${!isOff})">${isOff ? 'ON' : 'OFF'}</button>
                        <button class="btn-deactivate" onclick="deactivate('${d.specialist_email}', '${d.specialist_name}')">DE-ACT</button>
                    </div>
                </div>`;
            }).join('');
            
            let inactiveHtml = '';
            if (inactiveDefaults.length) {
                inactiveHtml = `
                <div class="inactive-section">
                    <h4>Inactive (${inactiveDefaults.length})</h4>
                    ${inactiveDefaults.map(d => `
                        <div class="inactive-row">
                            <span class="name">${d.specialist_name}</span>
                            <button class="btn-reactivate" onclick="reactivate('${d.specialist_email}')">RE-ACT</button>
                        </div>
                    `).join('')}
                </div>`;
            }
            
            document.getElementById('defaultsContainer').innerHTML = `
                <div class="list-header">
                    <span>Name</span>
                    <span>Schedule</span>
                    <span>Hrs</span>
                    <span></span>
                </div>
                <div class="specialist-list">${rows}</div>
                <div class="total-row">
                    <span>${workingCount} working</span>
                    <span class="hours">${totalHours.toFixed(1)}h total</span>
                </div>
                ${inactiveHtml}
            `;
        }
        
        async function updateShift(id) {
            const row = document.querySelector(`[data-id="${id}"]`);
            const inputs = row.querySelectorAll('input[type="time"]');
            const start = inputs[0].value;
            const end = inputs[1].value;
            
            try {
                await supabase(`default_shifts?id=eq.${id}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ start_time: start + ':00', end_time: end + ':00' })
                });
                const d = defaults.find(d => d.id === id);
                if (d) { d.start_time = start; d.end_time = end; }
                renderDefaults();
            } catch (e) { showMessage('Error: ' + e.message, 'error'); }
        }
        
        async function toggleOff(id, setOff) {
            try {
                await supabase(`default_shifts?id=eq.${id}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ is_off: setOff })
                });
                const d = defaults.find(d => d.id === id);
                if (d) d.is_off = setOff;
                renderDefaults();
            } catch (e) { showMessage('Error: ' + e.message, 'error'); }
        }
        
        async function deactivate(email, name) {
            if (!confirm(`Deactivate ${name}?`)) return;
            try {
                await supabase(`intake_specialists?email=eq.${encodeURIComponent(email)}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ is_active: false })
                });
                showMessage(`${name} deactivated`, 'success');
                loadDefaults();
            } catch (e) { showMessage('Error: ' + e.message, 'error'); }
        }
        
        async function reactivate(email) {
            try {
                await supabase(`intake_specialists?email=eq.${encodeURIComponent(email)}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ is_active: true })
                });
                showMessage('Reactivated', 'success');
                loadDefaults();
            } catch (e) { showMessage('Error: ' + e.message, 'error'); }
        }
        
        function showMessage(text, type) {
            document.getElementById('message').innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => document.getElementById('message').innerHTML = '', 3000);
        }
        
        // Section switching
        function showSection(section) {
            document.getElementById('section-daily').style.display = section === 'daily' ? 'block' : 'none';
            document.getElementById('section-defaults').style.display = section === 'defaults' ? 'block' : 'none';
            document.getElementById('tab-daily').classList.toggle('active', section === 'daily');
            document.getElementById('tab-defaults').classList.toggle('active', section === 'defaults');
            
            if (section === 'daily') loadDailyShifts();
        }
        
        // Daily shifts
        let dailyShifts = [];
        
        function changeDate(days) {
            const input = document.getElementById('shiftDate');
            const d = new Date(input.value);
            d.setDate(d.getDate() + days);
            input.value = d.toISOString().split('T')[0];
            loadDailyShifts();
        }
        
        function setToday() {
            document.getElementById('shiftDate').value = new Date().toISOString().split('T')[0];
            loadDailyShifts();
        }
        
        async function loadDailyShifts() {
            const date = document.getElementById('shiftDate').value;
            if (!date) return;
            
            document.getElementById('dateLabel').textContent = new Date(date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            
            try {
                dailyShifts = await supabase(`intake_shifts?shift_date=eq.${date}&order=specialist_name`) || [];
                renderDailyShifts();
            } catch (e) {
                showMessage('Error: ' + e.message, 'error');
            }
        }
        
        function renderDailyShifts() {
            if (!dailyShifts.length) {
                document.getElementById('dailyContainer').innerHTML = '<div class="empty">No overrides for this day.<br>Using default schedules.</div>';
                return;
            }
            
            document.getElementById('dailyContainer').innerHTML = dailyShifts.map(s => {
                const isOff = s.hours_scheduled === 0 || s.start_time === s.end_time || (s.start_time === '00:00:00' && s.end_time === '00:00:00');
                return `
                <div class="daily-row">
                    <span class="name">${s.specialist_name}</span>
                    <span class="times ${isOff ? 'off' : ''}">${isOff ? 'OFF' : formatTimeDisplay(s.start_time) + ' - ' + formatTimeDisplay(s.end_time)}</span>
                    <button class="daily-off-btn ${isOff ? 'is-on' : ''}" onclick="toggleDailyOff(${s.id}, ${!isOff})">${isOff ? 'ON' : 'OFF'}</button>
                    <button class="delete" onclick="deleteDailyShift(${s.id})">✕</button>
                </div>
            `}).join('');
        }
        
        function formatTimeDisplay(t) {
            if (!t) return '';
            const [h, m] = t.split(':');
            const hr = parseInt(h);
            return `${hr % 12 || 12}:${m} ${hr >= 12 ? 'PM' : 'AM'}`;
        }
        
        async function addDailyShift() {
            const date = document.getElementById('shiftDate').value;
            const email = document.getElementById('addSpecialist').value;
            const start = document.getElementById('addStart').value;
            const end = document.getElementById('addEnd').value;
            
            const spec = defaults.find(d => d.specialist_email === email) || inactiveDefaults.find(d => d.specialist_email === email);
            const name = spec?.specialist_name || email;
            
            try {
                await supabase('intake_shifts', {
                    method: 'POST',
                    body: JSON.stringify({
                        shift_date: date,
                        specialist_email: email,
                        specialist_name: name,
                        start_time: start + ':00',
                        end_time: end + ':00'
                    })
                });
                showMessage('Shift added', 'success');
                loadDailyShifts();
            } catch (e) {
                showMessage(e.message.includes('duplicate') ? 'Already has override' : 'Error: ' + e.message, 'error');
            }
        }
        
        async function deleteDailyShift(id) {
            if (!confirm('Remove this override?')) return;
            try {
                await supabase(`intake_shifts?id=eq.${id}`, { method: 'DELETE' });
                loadDailyShifts();
            } catch (e) { showMessage('Error', 'error'); }
        }
        
        async function toggleDailyOff(id, setOff) {
            try {
                if (setOff) {
                    // Set to OFF (00:00 - 00:00)
                    await supabase(`intake_shifts?id=eq.${id}`, {
                        method: 'PATCH',
                        body: JSON.stringify({ start_time: '00:00:00', end_time: '00:00:00' })
                    });
                    showMessage('Marked OFF', 'success');
                } else {
                    // Restore to default 9-5
                    await supabase(`intake_shifts?id=eq.${id}`, {
                        method: 'PATCH',
                        body: JSON.stringify({ start_time: '09:00:00', end_time: '17:00:00' })
                    });
                    showMessage('Restored to 9-5', 'success');
                }
                loadDailyShifts();
            } catch (e) {
                showMessage('Error: ' + e.message, 'error');
            }
        }
        
        async function addOffDay() {
            const date = document.getElementById('shiftDate').value;
            const email = document.getElementById('addSpecialist').value;
            const spec = defaults.find(d => d.specialist_email === email) || inactiveDefaults.find(d => d.specialist_email === email);
            const name = spec?.specialist_name || email;
            
            try {
                await supabase('intake_shifts', {
                    method: 'POST',
                    body: JSON.stringify({
                        shift_date: date,
                        specialist_email: email,
                        specialist_name: name,
                        start_time: '00:00:00',
                        end_time: '00:00:00'
                    })
                });
                showMessage(`${name} marked OFF`, 'success');
                loadDailyShifts();
            } catch (e) {
                showMessage(e.message.includes('duplicate') ? 'Already has override' : 'Error: ' + e.message, 'error');
            }
        }
        
        async function applyDefaults() {
            const date = document.getElementById('shiftDate').value;
            if (!confirm(`Apply all default schedules to ${date}?`)) return;
            
            try {
                let added = 0;
                for (const d of defaults) {
                    if (d.is_off) continue; // Skip if default is OFF
                    try {
                        await supabase('intake_shifts', {
                            method: 'POST',
                            body: JSON.stringify({
                                shift_date: date,
                                specialist_email: d.specialist_email,
                                specialist_name: d.specialist_name,
                                start_time: d.start_time,
                                end_time: d.end_time
                            })
                        });
                        added++;
                    } catch (e) {
                        // Skip duplicates
                    }
                }
                showMessage(`Applied ${added} shifts`, 'success');
                loadDailyShifts();
            } catch (e) {
                showMessage('Error: ' + e.message, 'error');
            }
        }
        
        function populateSpecialistDropdown() {
            const select = document.getElementById('addSpecialist');
            const allSpecs = [...defaults, ...inactiveDefaults].sort((a, b) => a.specialist_name.localeCompare(b.specialist_name));
            select.innerHTML = allSpecs.map(d => `<option value="${d.specialist_email}">${d.specialist_name}</option>`).join('');
        }
        
        // Init
        document.getElementById('shiftDate').value = new Date().toISOString().split('T')[0];
        loadDefaults().then(() => populateSpecialistDropdown());
    </script>
