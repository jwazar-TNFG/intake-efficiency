<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intake Shifts - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #333; }
        .header h1 { font-size: 24px; font-weight: 700; }
        
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-tab {
            padding: 10px 20px; background: #1a1a1a; border: none; color: #888;
            font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 6px; text-decoration: none;
        }
        .nav-tab:hover { background: #2a2a2a; color: #fff; }
        .nav-tab.active { background: #5BA4B5; color: #fff; }
        
        .section { display: none; }
        .section.active { display: block; }
        
        .date-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .date-nav button, .date-nav input {
            padding: 8px 12px; background: #1a1a1a; border: 1px solid #333;
            color: #fff; border-radius: 4px; font-size: 14px; cursor: pointer;
        }
        .date-nav button:hover { background: #2a2a2a; }
        
        .card { background: #1a1a1a; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .card h3 { font-size: 16px; margin-bottom: 15px; }
        
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 120px; }
        .form-group label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
        .form-group select, .form-group input {
            width: 100%; padding: 10px; background: #2a2a2a; border: 1px solid #444;
            color: #fff; border-radius: 4px; font-size: 14px;
        }
        
        .btn { padding: 10px 20px; border: none; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; }
        .btn-primary { background: #4ade80; color: #000; }
        .btn-primary:hover { background: #22c55e; }
        .btn-secondary { background: #5BA4B5; color: #fff; }
        .btn-secondary:hover { background: #4a8a9a; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { font-size: 12px; color: #888; font-weight: 500; text-transform: uppercase; }
        td { font-size: 14px; }
        .hours { color: #5BA4B5; font-weight: 600; }
        .delete-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 16px; }
        .total-row { font-weight: 700; background: #111; }
        .total-row td { border-bottom: none; }
        
        .message { padding: 12px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; }
        .message.success { background: #065f46; color: #6ee7b7; }
        .message.error { background: #7f1d1d; color: #fca5a5; }
        
        .empty { text-align: center; padding: 40px; color: #666; }
        
        .day-checks { display: flex; gap: 8px; flex-wrap: wrap; }
        .day-check { display: flex; align-items: center; gap: 4px; font-size: 12px; }
        .day-check input { width: auto; }
        
        .default-row td { vertical-align: middle; }
        .time-inputs { display: flex; gap: 5px; align-items: center; }
        .time-inputs input { width: 90px; padding: 6px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Intake Shift Manager</h1>
        </div>
        
        <div class="nav-tabs">
            <a href="index.html" class="nav-tab">📊 Dashboard</a>
            <button class="nav-tab active" onclick="showSection('daily')">📅 Daily Shifts</button>
            <button class="nav-tab" onclick="showSection('defaults')">⚙️ Default Schedules</button>
        </div>
        
        <div id="message"></div>
        
        <!-- Daily Shifts Section -->
        <div id="daily-section" class="section active">
            <div class="date-nav">
                <button onclick="changeDate(-1)">← Prev</button>
                <input type="date" id="shiftDate" onchange="loadShifts()">
                <button onclick="changeDate(1)">Next →</button>
                <button onclick="setToday()">Today</button>
                <button class="btn btn-secondary btn-sm" onclick="applyDefaults()">Apply Defaults</button>
            </div>
            
            <div class="card">
                <h3>Add Shift Override</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Specialist</label>
                        <select id="specialist"></select>
                    </div>
                    <div class="form-group">
                        <label>Start</label>
                        <input type="time" id="startTime" value="09:00">
                    </div>
                    <div class="form-group">
                        <label>End</label>
                        <input type="time" id="endTime" value="17:00">
                    </div>
                    <div class="form-group" style="display:flex;align-items:flex-end;">
                        <button class="btn btn-primary" onclick="addShift()">Add</button>
                    </div>
                </div>
            </div>
            
            <div id="shiftsContainer"><div class="empty">Loading...</div></div>
        </div>
        
        <!-- Default Schedules Section -->
        <div id="defaults-section" class="section">
            <div class="card">
                <h3>Default Weekly Schedules</h3>
                <p style="color:#888;font-size:13px;margin-bottom:15px;">
                    Set default hours for each specialist. Click "Apply Defaults" on daily view to populate.
                </p>
                <div id="defaultsContainer"><div class="empty">Loading...</div></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ymhhdipaplhzxpfhrunp.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_f_3vIV-VzDkK9UPxmDx1Sw_UXZ78iJq';
        
        let specialists = [];
        
        async function supabase(endpoint, options = {}) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, {
                ...options,
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': options.method === 'POST' ? 'return=representation' : (options.method === 'PATCH' ? 'return=representation' : 'return=minimal'),
                    ...options.headers
                }
            });
            if (!res.ok) throw new Error(await res.text());
            const text = await res.text();
            return text ? JSON.parse(text) : null;
        }
        
        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(section + '-section').classList.add('active');
            event.target.classList.add('active');
            if (section === 'defaults') loadDefaults();
        }
        
        async function loadSpecialists() {
            try {
                specialists = await supabase('intake_specialists?is_active=eq.true&order=display_name');
            } catch (e) {
                specialists = [
                    { email: 'rpena@thenofaultgroup.com', display_name: 'Richard Pena' },
                    { email: 'lvivas@thenofaultgroup.com', display_name: 'Luis Vivas' },
                    { email: 'oplasencia@305nofault.com', display_name: 'Orlando Plasencia' },
                    { email: 'nelsonr@305nofault.com', display_name: 'Nelson Rodriguez' },
                    { email: 'jjortega@thenofaultgroup.com', display_name: 'Juan Jose Ortega' },
                    { email: 'jortega@thenofaultgroup.com', display_name: 'Jesus Ortega' },
                    { email: 'nsilva@thenofaultgroup.com', display_name: 'Naryeli Silva' },
                    { email: 'jramirez@thenofaultgroup.com', display_name: 'Jonathan Ramirez' },
                    { email: 'scubillos@thenofaultgroup.com', display_name: 'Sebastian Cubillos' },
                    { email: 'mpenaranda@thenofaultgroup.com', display_name: 'Manny Penaranda' },
                ];
            }
            const select = document.getElementById('specialist');
            select.innerHTML = specialists.map(s => `<option value="${s.email}">${s.display_name}</option>`).join('');
        }
        
        async function loadShifts() {
            const date = document.getElementById('shiftDate').value;
            if (!date) return;
            try {
                const shifts = await supabase(`intake_shifts?shift_date=eq.${date}&order=specialist_name`);
                renderShifts(shifts || []);
            } catch (e) {
                showMessage('Error: ' + e.message, 'error');
                renderShifts([]);
            }
        }
        
        function renderShifts(shifts) {
            if (!shifts.length) {
                document.getElementById('shiftsContainer').innerHTML = `
                    <div class="empty">No shifts scheduled.<br>Add manually or click "Apply Defaults".</div>`;
                return;
            }
            const total = shifts.reduce((s, r) => s + parseFloat(r.hours_scheduled || 0), 0);
            document.getElementById('shiftsContainer').innerHTML = `
                <table>
                    <thead><tr><th>Specialist</th><th>Start</th><th>End</th><th>Hours</th><th></th></tr></thead>
                    <tbody>
                        ${shifts.map(s => `<tr>
                            <td>${s.specialist_name}</td>
                            <td>${formatTime(s.start_time)}</td>
                            <td>${formatTime(s.end_time)}</td>
                            <td class="hours">${parseFloat(s.hours_scheduled).toFixed(1)}h</td>
                            <td><button class="delete-btn" onclick="deleteShift(${s.id})">✕</button></td>
                        </tr>`).join('')}
                        <tr class="total-row"><td colspan="3"><strong>Total</strong></td><td class="hours">${total.toFixed(1)}h</td><td></td></tr>
                    </tbody>
                </table>`;
        }
        
        async function loadDefaults() {
            try {
                const defaults = await supabase('intake_default_shifts?is_active=eq.true&order=specialist_name');
                renderDefaults(defaults || []);
            } catch (e) {
                // If table doesn't exist or error, show setup form
                renderDefaultsSetup();
            }
        }
        
        function renderDefaults(defaults) {
            const defaultMap = {};
            defaults.forEach(d => defaultMap[d.specialist_email] = d);
            
            const rows = specialists.map(s => {
                const d = defaultMap[s.email] || {};
                const start = d.default_start || '09:00';
                const end = d.default_end || '17:00';
                return `<tr class="default-row" data-email="${s.email}">
                    <td>${s.display_name}</td>
                    <td class="time-inputs">
                        <input type="time" class="def-start" value="${start.substring(0,5)}">
                        <span>-</span>
                        <input type="time" class="def-end" value="${end.substring(0,5)}">
                    </td>
                    <td>
                        <button class="btn btn-primary btn-sm" onclick="saveDefault('${s.email}', '${s.display_name}')">Save</button>
                    </td>
                </tr>`;
            }).join('');
            
            document.getElementById('defaultsContainer').innerHTML = `
                <table>
                    <thead><tr><th>Specialist</th><th>Default Hours</th><th></th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>`;
        }
        
        function renderDefaultsSetup() {
            document.getElementById('defaultsContainer').innerHTML = `
                <div class="empty">Configure default schedules for each specialist above.</div>`;
            renderDefaults([]);
        }
        
        async function saveDefault(email, name) {
            const row = document.querySelector(`tr[data-email="${email}"]`);
            const start = row.querySelector('.def-start').value;
            const end = row.querySelector('.def-end').value;
            
            try {
                // Try update first, then insert
                const existing = await supabase(`intake_default_shifts?specialist_email=eq.${encodeURIComponent(email)}`);
                if (existing && existing.length > 0) {
                    await supabase(`intake_default_shifts?specialist_email=eq.${encodeURIComponent(email)}`, {
                        method: 'PATCH',
                        body: JSON.stringify({ default_start: start, default_end: end })
                    });
                } else {
                    await supabase('intake_default_shifts', {
                        method: 'POST',
                        body: JSON.stringify({
                            specialist_email: email,
                            specialist_name: name,
                            default_start: start,
                            default_end: end
                        })
                    });
                }
                showMessage(`Saved default for ${name}`, 'success');
            } catch (e) {
                showMessage('Error: ' + e.message, 'error');
            }
        }
        
        async function applyDefaults() {
            const date = document.getElementById('shiftDate').value;
            const dayOfWeek = new Date(date).getDay(); // 0=Sun, 1=Mon, etc.
            
            try {
                const defaults = await supabase('intake_default_shifts?is_active=eq.true');
                if (!defaults || !defaults.length) {
                    showMessage('No default schedules configured. Go to Default Schedules tab.', 'error');
                    return;
                }
                
                let added = 0;
                for (const d of defaults) {
                    try {
                        await supabase('intake_shifts', {
                            method: 'POST',
                            body: JSON.stringify({
                                shift_date: date,
                                specialist_email: d.specialist_email,
                                specialist_name: d.specialist_name,
                                start_time: d.default_start,
                                end_time: d.default_end
                            })
                        });
                        added++;
                    } catch (e) {
                        // Skip duplicates
                    }
                }
                showMessage(`Applied ${added} default shifts`, 'success');
                loadShifts();
            } catch (e) {
                showMessage('Error: ' + e.message, 'error');
            }
        }
        
        async function addShift() {
            const date = document.getElementById('shiftDate').value;
            const email = document.getElementById('specialist').value;
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;
            const spec = specialists.find(s => s.email === email);
            
            try {
                await supabase('intake_shifts', {
                    method: 'POST',
                    body: JSON.stringify({
                        shift_date: date,
                        specialist_email: email,
                        specialist_name: spec?.display_name || email,
                        start_time: start,
                        end_time: end
                    })
                });
                showMessage('Shift added', 'success');
                loadShifts();
            } catch (e) {
                showMessage(e.message.includes('duplicate') ? 'Already scheduled' : 'Error: ' + e.message, 'error');
            }
        }
        
        async function deleteShift(id) {
            if (!confirm('Delete?')) return;
            try {
                await supabase(`intake_shifts?id=eq.${id}`, { method: 'DELETE' });
                showMessage('Deleted', 'success');
                loadShifts();
            } catch (e) { showMessage('Error', 'error'); }
        }
        
        function changeDate(days) {
            const input = document.getElementById('shiftDate');
            const d = new Date(input.value);
            d.setDate(d.getDate() + days);
            input.value = d.toISOString().split('T')[0];
            loadShifts();
        }
        
        function setToday() {
            document.getElementById('shiftDate').value = new Date().toISOString().split('T')[0];
            loadShifts();
        }
        
        function formatTime(t) {
            if (!t) return '';
            const [h,m] = t.split(':');
            const hr = parseInt(h);
            return `${hr % 12 || 12}:${m} ${hr >= 12 ? 'PM' : 'AM'}`;
        }
        
        function showMessage(text, type) {
            document.getElementById('message').innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => document.getElementById('message').innerHTML = '', 3000);
        }
        
        // Init
        document.getElementById('shiftDate').value = new Date().toISOString().split('T')[0];
        loadSpecialists().then(() => { loadShifts(); });
    </script>
</body>
</html>
