<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intake Shifts - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #333; }
        .header h1 { font-size: 24px; font-weight: 700; }
        
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-tab {
            padding: 10px 20px; background: #1a1a1a; border: none; color: #888;
            font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 6px; text-decoration: none;
        }
        .nav-tab:hover { background: #2a2a2a; color: #fff; }
        .nav-tab.active { background: #5BA4B5; color: #fff; }
        
        .section { display: none; }
        .section.active { display: block; }
        
        .card { background: #1a1a1a; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .card h3 { font-size: 16px; margin-bottom: 15px; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; }
        .btn-primary { background: #4ade80; color: #000; }
        .btn-primary:hover { background: #22c55e; }
        .btn-secondary { background: #5BA4B5; color: #fff; }
        .btn-secondary:hover { background: #4a8a9a; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { font-size: 12px; color: #888; font-weight: 500; text-transform: uppercase; }
        td { font-size: 14px; }
        .hours { color: #5BA4B5; font-weight: 600; }
        .delete-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 16px; padding: 4px 8px; }
        .total-row { font-weight: 700; background: #111; }
        .total-row td { border-bottom: none; }
        
        .message { padding: 12px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; }
        .message.success { background: #065f46; color: #6ee7b7; }
        .message.error { background: #7f1d1d; color: #fca5a5; }
        
        .empty { text-align: center; padding: 40px; color: #666; }
        
        /* OFF toggle button styles */
        .off-toggle {
            padding: 6px 14px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .off-toggle.working {
            background: #2a2a2a;
            color: #888;
        }
        .off-toggle.working:hover {
            background: #7f1d1d;
            color: #fca5a5;
        }
        .off-toggle.off {
            background: #ef4444;
            color: #fff;
        }
        .off-toggle.off:hover {
            background: #065f46;
            color: #6ee7b7;
        }
        
        /* Row when OFF */
        tr.is-off td {
            color: #666;
        }
        tr.is-off .hours {
            color: #ef4444;
        }
        tr.is-off input {
            opacity: 0.4;
            pointer-events: none;
        }
        
        .time-inputs { display: flex; gap: 5px; align-items: center; }
        .time-inputs input { 
            width: 85px; 
            padding: 8px; 
            font-size: 13px; 
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
        }
        .time-inputs span { color: #666; }
        
        .hours-display {
            min-width: 50px;
            text-align: center;
        }
        
        .save-indicator {
            font-size: 11px;
            color: #4ade80;
            margin-left: 8px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .save-indicator.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Intake Shift Manager</h1>
        </div>
        
        <div class="nav-tabs">
            <a href="index.html" class="nav-tab">📊 Dashboard</a>
            <button class="nav-tab active" onclick="showSection('defaults')">⚙️ Default Schedules</button>
        </div>
        
        <div id="message"></div>
        
        <!-- Default Schedules Section -->
        <div id="defaults-section" class="section active">
            <div class="card">
                <h3>Default Weekly Schedules (Mon-Fri)</h3>
                <p style="color:#888;font-size:13px;margin-bottom:15px;">
                    Set default hours for each specialist. Changes apply to all weekdays automatically.
                    <br>Click <strong>OFF</strong> to mark someone as not working.
                </p>
                <div id="defaultsContainer"><div class="empty">Loading...</div></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ymhhdipaplhzxpfhrunp.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_f_3vIV-VzDkK9UPxmDx1Sw_UXZ78iJq';
        
        let specialists = [];
        let defaults = [];
        
        async function supabase(endpoint, options = {}) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, {
                ...options,
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': options.method === 'POST' ? 'return=representation' : (options.method === 'PATCH' ? 'return=representation' : 'return=minimal'),
                    ...options.headers
                }
            });
            if (!res.ok) throw new Error(await res.text());
            const text = await res.text();
            return text ? JSON.parse(text) : null;
        }
        
        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(section + '-section').classList.add('active');
            event.target.classList.add('active');
        }
        
        async function loadSpecialists() {
            try {
                specialists = await supabase('intake_specialists?is_active=eq.true&order=display_name');
            } catch (e) {
                console.error('Failed to load specialists:', e);
                specialists = [];
            }
        }
        
        async function loadDefaults() {
            try {
                // Load from default_shifts table (day_of_week IS NULL = Mon-Fri default)
                defaults = await supabase('default_shifts?day_of_week=is.null&order=specialist_name');
                renderDefaults();
            } catch (e) {
                console.error('Failed to load defaults:', e);
                showMessage('Error loading schedules: ' + e.message, 'error');
                document.getElementById('defaultsContainer').innerHTML = '<div class="empty">Failed to load schedules</div>';
            }
        }
        
        function formatTimeForInput(timeStr) {
            if (!timeStr) return '09:00';
            // Handle HH:MM:SS format
            return timeStr.substring(0, 5);
        }
        
        function formatTimeDisplay(timeStr) {
            if (!timeStr) return '';
            const [h, m] = timeStr.split(':');
            const hr = parseInt(h);
            return `${hr % 12 || 12}:${m} ${hr >= 12 ? 'PM' : 'AM'}`;
        }
        
        function calculateHours(start, end) {
            if (!start || !end) return 0;
            const [sh, sm] = start.split(':').map(Number);
            const [eh, em] = end.split(':').map(Number);
            return ((eh * 60 + em) - (sh * 60 + sm)) / 60;
        }
        
        function renderDefaults() {
            if (!defaults || defaults.length === 0) {
                document.getElementById('defaultsContainer').innerHTML = '<div class="empty">No schedules configured</div>';
                return;
            }
            
            let totalHours = 0;
            let workingCount = 0;
            
            const rows = defaults.map(d => {
                const isOff = d.is_off === true;
                const start = formatTimeForInput(d.start_time);
                const end = formatTimeForInput(d.end_time);
                const hours = isOff ? 0 : calculateHours(start, end);
                
                if (!isOff) {
                    totalHours += hours;
                    workingCount++;
                }
                
                return `
                <tr class="default-row ${isOff ? 'is-off' : ''}" data-id="${d.id}" data-email="${d.specialist_email}">
                    <td>${d.specialist_name}</td>
                    <td class="time-inputs">
                        <input type="time" class="def-start" value="${start}" onchange="updateShift(${d.id})">
                        <span>-</span>
                        <input type="time" class="def-end" value="${end}" onchange="updateShift(${d.id})">
                    </td>
                    <td class="hours-display">
                        <span class="hours">${isOff ? 'OFF' : hours.toFixed(1) + 'h'}</span>
                    </td>
                    <td>
                        <button class="off-toggle ${isOff ? 'off' : 'working'}" onclick="toggleOff(${d.id}, ${!isOff})">
                            ${isOff ? 'ON' : 'OFF'}
                        </button>
                        <span class="save-indicator" id="saved-${d.id}">✓ Saved</span>
                    </td>
                </tr>`;
            }).join('');
            
            document.getElementById('defaultsContainer').innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Specialist</th>
                            <th>Start - End</th>
                            <th>Hours</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows}
                        <tr class="total-row">
                            <td><strong>Total (${workingCount} working)</strong></td>
                            <td></td>
                            <td class="hours">${totalHours.toFixed(1)}h</td>
                            <td></td>
                        </tr>
                    </tbody>
                </table>
            `;
        }
        
        async function updateShift(id) {
            const row = document.querySelector(`tr[data-id="${id}"]`);
            const start = row.querySelector('.def-start').value;
            const end = row.querySelector('.def-end').value;
            
            try {
                await supabase(`default_shifts?id=eq.${id}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ 
                        start_time: start + ':00',
                        end_time: end + ':00',
                        updated_at: new Date().toISOString()
                    })
                });
                
                // Update local data and re-render
                const d = defaults.find(d => d.id === id);
                if (d) {
                    d.start_time = start + ':00';
                    d.end_time = end + ':00';
                }
                renderDefaults();
                showSaved(id);
            } catch (e) {
                showMessage('Error saving: ' + e.message, 'error');
            }
        }
        
        async function toggleOff(id, setOff) {
            try {
                await supabase(`default_shifts?id=eq.${id}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ 
                        is_off: setOff,
                        updated_at: new Date().toISOString()
                    })
                });
                
                // Update local data and re-render
                const d = defaults.find(d => d.id === id);
                if (d) {
                    d.is_off = setOff;
                }
                renderDefaults();
                showSaved(id);
                showMessage(setOff ? 'Marked as OFF' : 'Marked as working', 'success');
            } catch (e) {
                showMessage('Error: ' + e.message, 'error');
            }
        }
        
        function showSaved(id) {
            const indicator = document.getElementById(`saved-${id}`);
            if (indicator) {
                indicator.classList.add('show');
                setTimeout(() => indicator.classList.remove('show'), 2000);
            }
        }
        
        function showMessage(text, type) {
            document.getElementById('message').innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => document.getElementById('message').innerHTML = '', 3000);
        }
        
        // Init
        loadSpecialists().then(() => loadDefaults());
    </script>
</body>
</html>
