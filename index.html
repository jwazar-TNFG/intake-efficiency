<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intake Efficiency Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 900px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 28px; font-weight: 800; letter-spacing: 2px; margin-bottom: 0; }
        .header h2 { font-size: 22px; font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; }
        .header .date { font-size: 14px; color: #888; }
        
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .tab {
            padding: 10px 20px;
            background: #1a1a1a;
            border: none;
            color: #888;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 6px;
            text-decoration: none;
        }
        
        .tab:hover { background: #2a2a2a; color: #fff; }
        .tab.active { background: #5BA4B5; color: #fff; }
        
        .chart-area { padding-top: 10px; }
        
        .bar-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            height: 32px;
        }
        
        .bar-name {
            width: 160px;
            text-align: right;
            padding-right: 15px;
            font-size: 14px;
            font-weight: 500;
            flex-shrink: 0;
        }
        
        .bar-track {
            flex: 1;
            height: 28px;
            background: #1a1a1a;
            border-radius: 4px;
            position: relative;
            max-width: 400px;
        }
        
        .bar-fill {
            height: 100%;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            font-size: 14px;
            font-weight: 700;
            min-width: 50px;
        }
        
        .bar-fill.elite { background: #4ade80; color: #000; }
        .bar-fill.solid { background: #5BA4B5; color: #fff; }
        .bar-fill.average { background: #fbbf24; color: #000; }
        .bar-fill.below { background: #ef4444; color: #fff; }
        
        .bar-stats {
            width: 100px;
            text-align: left;
            font-size: 12px;
            color: #888;
            padding-left: 15px;
            flex-shrink: 0;
        }
        
        .footer {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #333;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .summary-box {
            background: #1a1a1a;
            padding: 15px 20px;
            border-radius: 8px;
        }
        
        .summary-box .line { font-size: 14px; margin-bottom: 5px; }
        .summary-box .line:last-child { margin-bottom: 0; }
        .summary-box .value { font-weight: 700; }
        .summary-box .elite-count { color: #4ade80; }
        
        .legend { display: flex; flex-direction: column; gap: 6px; font-size: 12px; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        .legend-dot.elite { background: #4ade80; }
        .legend-dot.solid { background: #5BA4B5; }
        .legend-dot.average { background: #fbbf24; }
        .legend-dot.below { background: #ef4444; }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state h3 { font-size: 18px; margin-bottom: 10px; color: #888; }
        .empty-state p { font-size: 14px; }
        
        .loading { text-align: center; padding: 100px; color: #888; }
        
        .updated { text-align: center; font-size: 11px; color: #444; margin-top: 20px; }
        
        /* Hourly Heatmap Styles */
        .heatmap-section {
            margin-bottom: 30px;
            overflow-x: auto;
        }
        
        .heatmap-title {
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .heatmap-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            min-width: 700px;
        }
        
        .heatmap-table th {
            background: #1a1a1a;
            padding: 8px 4px;
            text-align: center;
            font-weight: 600;
            border: 1px solid #333;
        }
        
        .heatmap-table th.name-col {
            text-align: left;
            padding-left: 10px;
            width: 140px;
        }
        
        .heatmap-table th.total-col {
            width: 50px;
            background: #2a2a2a;
        }
        
        .heatmap-table td {
            padding: 6px 4px;
            text-align: center;
            border: 1px solid #333;
            font-weight: 500;
        }
        
        .heatmap-table td.name-cell {
            text-align: left;
            padding-left: 10px;
            font-weight: 500;
        }
        
        .heatmap-table td.total-cell {
            font-weight: 700;
            background: #2a2a2a;
        }
        
        .heatmap-table tr.elite-row td { background: #166534; }
        .heatmap-table tr.elite-row td.name-cell,
        .heatmap-table tr.elite-row td.total-cell { background: #14532d; }
        
        .heatmap-table tr.solid-row td { background: #365314; }
        .heatmap-table tr.solid-row td.name-cell,
        .heatmap-table tr.solid-row td.total-cell { background: #1a2e05; }
        
        .heatmap-table tr.average-row td { background: #713f12; }
        .heatmap-table tr.average-row td.name-cell,
        .heatmap-table tr.average-row td.total-cell { background: #451a03; }
        
        .heatmap-table tr.below-row td { background: #7f1d1d; }
        .heatmap-table tr.below-row td.name-cell,
        .heatmap-table tr.below-row td.total-cell { background: #450a0a; }
        
        .heatmap-table tr.zero-row td { background: #3f3f46; }
        .heatmap-table tr.zero-row td.name-cell,
        .heatmap-table tr.zero-row td.total-cell { background: #27272a; }
        
        .heatmap-cell-dash { color: #666; }
        
        .section-divider {
            border-top: 2px solid #333;
            margin: 30px 0;
            padding-top: 20px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="loading">Loading...</div>
    </div>

    <script>
        async function fetchData() {
            try {
                const response = await fetch('./data.json?' + Date.now());
                if (!response.ok) throw new Error('Failed to fetch data');
                const data = await response.json();
                renderDashboard(data);
            } catch (error) {
                console.error(error);
                document.getElementById('app').innerHTML = `<div class="loading">Error: ${error.message}</div>`;
            }
        }
        
        function getBarClass(rate) {
            if (rate >= 1.0) return 'elite';
            if (rate >= 0.6) return 'solid';
            if (rate >= 0.4) return 'average';
            return 'below';
        }
        
        function getRowClass(ld, rate) {
            if (ld === 0) return 'zero-row';
            if (rate >= 1.0) return 'elite-row';
            if (rate >= 0.6) return 'solid-row';
            if (rate >= 0.4) return 'average-row';
            return 'below-row';
        }
        
        function renderHeatmap(reps) {
            // Hour labels: 7A, 8A, 9A, 10A, 11A, 12P, 1P, 2P, 3P, 4P, 5P, 6P, 7P, 8P, 9P, 10P
            const hourLabels = ['7A', '8A', '9A', '10A', '11A', '12P', '1P', '2P', '3P', '4P', '5P', '6P', '7P', '8P', '9P', '10P'];
            
            // Sort by total LD descending for heatmap
            const sortedReps = [...reps].sort((a, b) => b.ld - a.ld);
            
            let headerRow = '<tr><th class="name-col">Intaker</th>';
            hourLabels.forEach(h => { headerRow += `<th>${h}</th>`; });
            headerRow += '<th class="total-col">TOT</th></tr>';
            
            let bodyRows = sortedReps.map(rep => {
                const rowClass = getRowClass(rep.ld, rep.rate);
                const hourly = rep.hourly || new Array(16).fill(0);
                
                let row = `<tr class="${rowClass}"><td class="name-cell">${rep.name}</td>`;
                hourly.forEach(count => {
                    if (count === 0) {
                        row += '<td class="heatmap-cell-dash">-</td>';
                    } else {
                        row += `<td>${count}</td>`;
                    }
                });
                row += `<td class="total-cell">${rep.ld}</td></tr>`;
                return row;
            }).join('');
            
            return `
                <div class="heatmap-section">
                    <div class="heatmap-title">Signed by Hour per Intaker</div>
                    <table class="heatmap-table">
                        <thead>${headerRow}</thead>
                        <tbody>${bodyRows}</tbody>
                    </table>
                </div>
            `;
        }
        
        function renderDashboard(data) {
            const dateObj = new Date(data.date + 'T12:00:00');
            const formattedDate = dateObj.toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            
            const reps = data.reps || [];
            const totalLD = reps.reduce((sum, r) => sum + r.ld, 0);
            const totalHours = reps.reduce((sum, r) => sum + r.hours, 0);
            const teamAvg = totalHours > 0 ? (totalLD / totalHours).toFixed(2) : '0.00';
            const eliteCount = reps.filter(r => r.rate >= 1.0).length;
            
            const tabs = `
                <div class="tabs">
                    <a href="index.html" class="tab active">Dashboard</a>
                    <a href="admin.html" class="tab">Manage Shifts</a>
                </div>
            `;
            
            // Empty state
            if (reps.length === 0) {
                document.getElementById('app').innerHTML = `
                    <div class="header">
                        <h1>1-800-NO-FAULT</h1>
                        <h2>INTAKE EFFICIENCY REPORT</h2>
                        <div class="date">${formattedDate}</div>
                    </div>
                    ${tabs}
                    <div class="empty-state">
                        <h3>No Data Yet</h3>
                        <p>Waiting for intake specialists to lock down cases today.</p>
                        <p style="margin-top: 10px; color: #555;">Refreshes every 15 minutes</p>
                    </div>
                `;
                return;
            }
            
            const maxRate = Math.max(...reps.map(r => r.rate), 1.5);
            const scaleMax = Math.min(maxRate * 1.1, 2.0);
            
            let barsHtml = reps.map(rep => {
                const barWidth = Math.max((rep.rate / scaleMax) * 100, 5);
                const barClass = getBarClass(rep.rate);
                return `
                    <div class="bar-row">
                        <div class="bar-name">${rep.name}</div>
                        <div class="bar-track">
                            <div class="bar-fill ${barClass}" style="width: ${barWidth}%">
                                ${rep.rate.toFixed(2)}
                            </div>
                        </div>
                        <div class="bar-stats">${rep.ld} LD | ${rep.hours}h</div>
                    </div>
                `;
            }).join('');
            
            const updatedTime = data.updated ? new Date(data.updated).toLocaleTimeString() : '';
            
            const heatmapHtml = renderHeatmap(reps);
            
            document.getElementById('app').innerHTML = `
                <div class="header">
                    <h1>1-800-NO-FAULT</h1>
                    <h2>INTAKE EFFICIENCY REPORT</h2>
                    <div class="date">${formattedDate} | ${totalLD} Total LD</div>
                </div>
                
                ${tabs}
                
                ${heatmapHtml}
                
                <div class="section-divider">
                    <div class="section-title">LD/Hour Performance</div>
                </div>
                
                <div class="chart-area">
                    ${barsHtml}
                </div>
                
                <div class="footer">
                    <div class="summary-box">
                        <div class="line"><span class="value">TOTAL LD: ${totalLD}</span></div>
                        <div class="line">TEAM AVG: <span class="value">${teamAvg}/hr</span></div>
                        <div class="line"><span class="elite-count">ELITE (1.0+): ${eliteCount}</span></div>
                    </div>
                    
                    <div class="legend">
                        <div class="legend-item"><span class="legend-dot elite"></span> 1.0+ Elite</div>
                        <div class="legend-item"><span class="legend-dot solid"></span> 0.6-1.0 Solid</div>
                        <div class="legend-item"><span class="legend-dot average"></span> 0.4-0.6 Average</div>
                        <div class="legend-item"><span class="legend-dot below"></span> &lt;0.4 Below</div>
                    </div>
                </div>
                
                <div class="updated">Last updated: ${updatedTime}</div>
            `;
        }
        
        fetchData();
        setInterval(fetchData, 300000);
    </script>
</body>
</html>
