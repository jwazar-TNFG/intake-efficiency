<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intake Efficiency Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 900px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 28px; font-weight: 800; letter-spacing: 2px; margin-bottom: 0; }
        .header h2 { font-size: 22px; font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; }
        .header .date { font-size: 14px; color: #888; }
        
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .tab {
            padding: 10px 20px;
            background: #1a1a1a;
            border: none;
            color: #888;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 6px;
            text-decoration: none;
        }
        
        .tab:hover { background: #2a2a2a; color: #fff; }
        .tab.active { background: #5BA4B5; color: #fff; }
        
        .chart-area { padding-top: 10px; }
        
        .bar-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            height: 32px;
        }
        
        .bar-name {
            width: 160px;
            text-align: right;
            padding-right: 15px;
            font-size: 14px;
            font-weight: 500;
            flex-shrink: 0;
        }
        
        .bar-track {
            flex: 1;
            height: 28px;
            background: #1a1a1a;
            border-radius: 4px;
            position: relative;
            max-width: 400px;
        }
        
        .bar-fill {
            height: 100%;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            font-size: 14px;
            font-weight: 700;
            min-width: 50px;
        }
        
        .bar-fill.elite { background: #4ade80; color: #000; }
        .bar-fill.solid { background: #5BA4B5; color: #fff; }
        .bar-fill.average { background: #fbbf24; color: #000; }
        .bar-fill.below { background: #ef4444; color: #fff; }
        
        .bar-stats {
            width: 100px;
            text-align: left;
            font-size: 12px;
            color: #888;
            padding-left: 15px;
            flex-shrink: 0;
        }
        
        .footer {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #333;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .summary-box {
            background: #1a1a1a;
            padding: 15px 20px;
            border-radius: 8px;
        }
        
        .summary-box .line { font-size: 14px; margin-bottom: 5px; }
        .summary-box .line:last-child { margin-bottom: 0; }
        .summary-box .value { font-weight: 700; }
        .summary-box .elite-count { color: #4ade80; }
        
        .legend { display: flex; flex-direction: column; gap: 6px; font-size: 12px; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        .legend-dot.elite { background: #4ade80; }
        .legend-dot.solid { background: #5BA4B5; }
        .legend-dot.average { background: #fbbf24; }
        .legend-dot.below { background: #ef4444; }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state h3 { font-size: 18px; margin-bottom: 10px; color: #888; }
        .empty-state p { font-size: 14px; }
        
        .loading { text-align: center; padding: 100px; color: #888; }
        
        .updated { text-align: center; font-size: 11px; color: #444; margin-top: 20px; }
        
        /* Hourly Heatmap Styles */
        .heatmap-section {
            margin-bottom: 30px;
        }
        
        .heatmap-wrapper {
            overflow-x: auto;
            position: relative;
        }
        
        .heatmap-title {
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .heatmap-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            table-layout: fixed;
        }
        
        .heatmap-table th {
            background: #1a1a1a;
            padding: 6px 2px;
            text-align: center;
            font-weight: 600;
            border: 1px solid #333;
            white-space: nowrap;
        }
        
        .heatmap-table th.name-col {
            text-align: left;
            padding-left: 6px;
            width: 85px;
            position: sticky;
            left: 0;
            z-index: 2;
            background: #1a1a1a;
        }
        
        .heatmap-table th.total-col {
            width: 28px;
            background: #2a2a2a;
        }
        
        .heatmap-table th.star-col {
            width: 28px;
            background: #2a2a2a;
            position: sticky;
            left: 85px;
            z-index: 2;
        }
        
        .heatmap-table td.star-cell {
            background: #2a2a2a;
            font-weight: 600;
            color: #5BA4B5;
            position: sticky;
            left: 85px;
            z-index: 1;
        }
        
        .heatmap-table th.hour-col {
            width: 22px;
            font-size: 10px;
        }
        
        .heatmap-table td {
            padding: 5px 2px;
            text-align: center;
            border: 1px solid #333;
            font-weight: 500;
        }
        
        .heatmap-table td.name-cell {
            text-align: left;
            padding-left: 6px;
            font-weight: 500;
            font-size: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            position: sticky;
            left: 0;
            z-index: 1;
            background: inherit;
        }
        
        .heatmap-table tr.elite-row td.name-cell { background: #14532d; }
        .heatmap-table tr.solid-row td.name-cell { background: #1a2e05; }
        .heatmap-table tr.average-row td.name-cell { background: #451a03; }
        .heatmap-table tr.below-row td.name-cell { background: #450a0a; }
        .heatmap-table tr.zero-row td.name-cell { background: #27272a; }
        
        .heatmap-table td.total-cell {
            font-weight: 700;
            background: #2a2a2a;
        }
        
        @media (max-width: 480px) {
            .heatmap-table th.name-col,
            .heatmap-table td.name-cell {
                width: 80px;
                font-size: 9px;
            }
            .heatmap-table th.hour-col {
                width: 18px;
                font-size: 9px;
            }
            .heatmap-table td {
                padding: 4px 1px;
                font-size: 10px;
            }
        }
        
        .heatmap-table tr.elite-row td { background: #166534; }
        .heatmap-table tr.elite-row td.name-cell,
        .heatmap-table tr.elite-row td.total-cell { background: #14532d; }
        
        .heatmap-table tr.solid-row td { background: #365314; }
        .heatmap-table tr.solid-row td.name-cell,
        .heatmap-table tr.solid-row td.total-cell { background: #1a2e05; }
        
        .heatmap-table tr.average-row td { background: #713f12; }
        .heatmap-table tr.average-row td.name-cell,
        .heatmap-table tr.average-row td.total-cell { background: #451a03; }
        
        .heatmap-table tr.below-row td { background: #7f1d1d; }
        .heatmap-table tr.below-row td.name-cell,
        .heatmap-table tr.below-row td.total-cell { background: #450a0a; }
        
        .heatmap-table tr.zero-row td { background: #3f3f46; }
        .heatmap-table tr.zero-row td.name-cell,
        .heatmap-table tr.zero-row td.total-cell { background: #27272a; }
        
        .heatmap-cell-dash { color: #666; }
        
        .section-divider {
            border-top: 2px solid #333;
            margin: 30px 0;
            padding-top: 20px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #888;
        }
        
        /* Department Summary Block */
        .dept-summary {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .dept-summary-title {
            font-size: 14px;
            font-weight: 700;
            color: #5BA4B5;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .dept-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 15px 30px;
        }
        
        .dept-stat {
            font-size: 13px;
        }
        
        .dept-stat-label {
            color: #888;
        }
        
        .dept-stat-value {
            font-weight: 700;
            color: #fff;
        }
        
        .dept-stat-value.positive { color: #4ade80; }
        .dept-stat-value.negative { color: #ef4444; }
        
        /* Hourly totals row */
        .heatmap-table tr.totals-row td {
            background: #1a1a1a;
            font-weight: 700;
            border-top: 2px solid #444;
        }
        
        .heatmap-table tr.totals-row td.name-cell {
            background: #1a1a1a;
            color: #5BA4B5;
        }
        
        .heatmap-table tr.totals-row td.star-cell {
            background: #2a2a2a;
        }
        
        /* Hourly total heatmap colors */
        .hourly-heat-0 { background: #1a1a1a !important; color: #666; }
        .hourly-heat-1 { background: #14532d !important; }
        .hourly-heat-2 { background: #166534 !important; }
        .hourly-heat-3 { background: #15803d !important; }
        .hourly-heat-4 { background: #16a34a !important; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="loading">Loading...</div>
    </div>

    <script>
        async function fetchData() {
            try {
                const response = await fetch('./data.json?' + Date.now());
                if (!response.ok) throw new Error('Failed to fetch data');
                const data = await response.json();
                renderDashboard(data);
            } catch (error) {
                console.error(error);
                document.getElementById('app').innerHTML = `<div class="loading">Error: ${error.message}</div>`;
            }
        }
        
        function getBarClass(rate) {
            if (rate >= 1.0) return 'elite';
            if (rate >= 0.6) return 'solid';
            if (rate >= 0.4) return 'average';
            return 'below';
        }
        
        function getRowClass(ld, rate) {
            if (ld === 0) return 'zero-row';
            if (rate >= 1.0) return 'elite-row';
            if (rate >= 0.6) return 'solid-row';
            if (rate >= 0.4) return 'average-row';
            return 'below-row';
        }
        
        function renderHeatmap(reps, dept) {
            // Hour labels: 7A, 8A, 9A, 10A, 11A, 12P, 1P, 2P, 3P, 4P, 5P, 6P, 7P, 8P, 9P, 10P, 11P
            const hourLabels = ['7A', '8A', '9A', '10A', '11A', '12P', '1P', '2P', '3P', '4P', '5P', '6P', '7P', '8P', '9P', '10P', '11P'];
            
            // Separate scheduled vs OFF specialists
            const scheduledReps = reps.filter(r => !r.is_off).sort((a, b) => b.ld - a.ld);
            const offReps = reps.filter(r => r.is_off).sort((a, b) => b.ld - a.ld);
            
            let headerRow = '<tr><th class="name-col">Intaker</th><th class="star-col">*</th>';
            hourLabels.forEach(h => { headerRow += `<th class="hour-col">${h}</th>`; });
            headerRow += '<th class="total-col">TOT</th></tr>';
            
            function renderRepRow(rep, isOff = false) {
                const rowClass = getRowClass(rep.ld, rep.rate);
                const hourly = rep.hourly || new Array(17).fill(0);
                const displayName = rep.abbrev || rep.name;
                const rateWorked = rep.rate_worked !== undefined && rep.rate_worked > 0 ? rep.rate_worked.toFixed(1) : '-';
                
                // Shift hour range (start_hour and end_hour are actual hours like 8, 14, 23)
                const startHour = rep.start_hour;  // e.g., 8 for 8AM
                const endHour = rep.end_hour;      // e.g., 17 for 5PM
                const hasShift = startHour !== null && startHour !== undefined;
                
                // For OFF specialists, show name with OFF indicator
                const nameDisplay = isOff ? `<span style="color: #888;">${displayName}</span> <span style="color: #f59e0b; font-size: 10px;">OFF</span>` : displayName;
                
                let row = `<tr class="${rowClass}"><td class="name-cell">${nameDisplay}</td><td class="star-cell">${rateWorked}</td>`;
                hourly.forEach((count, idx) => {
                    // idx 0 = 7AM, idx 1 = 8AM, etc. So actual hour = idx + 7
                    const actualHour = idx + 7;
                    const isInShift = hasShift && actualHour >= startHour && actualHour < endHour;
                    
                    if (count === 0) {
                        // Show X only if this hour is within their scheduled shift (not for OFF)
                        if (isInShift && !isOff) {
                            row += '<td class="heatmap-cell-dash" style="color: #ef4444;">X</td>';
                        } else {
                            row += '<td class="heatmap-cell-dash">-</td>';
                        }
                    } else {
                        // Yellow text if LD occurred outside of scheduled shift (or if OFF)
                        if (!isInShift || isOff) {
                            row += `<td style="color: #fbbf24;">${count}</td>`;  // Yellow for outside shift
                        } else {
                            row += `<td>${count}</td>`;  // White for during shift
                        }
                    }
                });
                row += `<td class="total-cell">${rep.ld}</td></tr>`;
                return row;
            }
            
            let bodyRows = scheduledReps.map(rep => renderRepRow(rep, false)).join('');
            
            // Add OFF section if there are OFF specialists with LDs
            if (offReps.length > 0) {
                bodyRows += `<tr class="off-divider"><td colspan="20" style="background: #1a1a1a; color: #f59e0b; font-size: 11px; font-weight: 600; padding: 6px; text-align: center; border-top: 2px solid #333;">OFF TODAY</td></tr>`;
                bodyRows += offReps.map(rep => renderRepRow(rep, true)).join('');
            }
            
            // Hourly totals row
            const hourlyTotals = dept.hourly_totals || new Array(17).fill(0);
            const maxHourlyTotal = Math.max(...hourlyTotals, 1);
            
            function getHourlyHeatClass(val) {
                if (val === 0) return 'hourly-heat-0';
                const ratio = val / maxHourlyTotal;
                if (ratio >= 0.75) return 'hourly-heat-4';
                if (ratio >= 0.5) return 'hourly-heat-3';
                if (ratio >= 0.25) return 'hourly-heat-2';
                return 'hourly-heat-1';
            }
            
            // Teal gradient for TOTAL row
            function getTealHeatStyle(val, maxVal) {
                if (val === 0) return 'background: #1a1a1a; color: #666;';
                const ratio = val / Math.max(maxVal, 1);
                if (ratio >= 0.75) return 'background: #0d9488; color: #fff;';  // teal-600
                if (ratio >= 0.5) return 'background: #14b8a6; color: #fff;';   // teal-500
                if (ratio >= 0.25) return 'background: #2dd4bf; color: #000;';  // teal-400
                return 'background: #5eead4; color: #000;';                      // teal-300
            }
            
            let totalsRow = '<tr class="totals-row"><td class="name-cell">TOTAL</td><td class="star-cell">-</td>';
            hourlyTotals.forEach(count => {
                const style = getTealHeatStyle(count, maxHourlyTotal);
                if (count === 0) {
                    totalsRow += `<td style="${style}">-</td>`;
                } else {
                    totalsRow += `<td style="${style}">${count}</td>`;
                }
            });
            totalsRow += `<td class="total-cell">${dept.total_ld}</td></tr>`;
            
            // Green gradient for Came In row
            const hourlyCameIn = dept.hourly_came_in || new Array(17).fill(0);
            const maxCameIn = Math.max(...hourlyCameIn, 1);
            
            function getGreenHeatStyle(val, maxVal) {
                if (val === 0) return 'background: #1a1a1a; color: #666;';
                const ratio = val / Math.max(maxVal, 1);
                if (ratio >= 0.75) return 'background: #16a34a; color: #fff;';  // green-600
                if (ratio >= 0.5) return 'background: #22c55e; color: #fff;';   // green-500
                if (ratio >= 0.25) return 'background: #4ade80; color: #000;';  // green-400
                return 'background: #86efac; color: #000;';                      // green-300
            }
            
            const totalCameIn = dept.total_came_in || 0;
            let cameInRow = '<tr class="plain-row"><td class="name-cell" style="color: #4ade80;">Came In</td><td class="star-cell">-</td>';
            hourlyCameIn.forEach(count => {
                const style = getGreenHeatStyle(count, maxCameIn);
                if (count === 0) {
                    cameInRow += `<td style="${style}">-</td>`;
                } else {
                    cameInRow += `<td style="${style}">${count}</td>`;
                }
            });
            cameInRow += `<td class="total-cell" style="background: #14532d; color: #4ade80;">${totalCameIn}</td></tr>`;
            
            // Red gradient for Dropped row
            const hourlyDropped = dept.hourly_dropped || new Array(17).fill(0);
            const maxDropped = Math.max(...hourlyDropped, 1);
            
            function getRedHeatStyle(val, maxVal) {
                if (val === 0) return 'background: #1a1a1a; color: #666;';
                const ratio = val / Math.max(maxVal, 1);
                if (ratio >= 0.75) return 'background: #dc2626; color: #fff;';  // red-600
                if (ratio >= 0.5) return 'background: #ef4444; color: #fff;';   // red-500
                if (ratio >= 0.25) return 'background: #f87171; color: #000;';  // red-400
                return 'background: #fca5a5; color: #000;';                      // red-300
            }
            
            const totalDropped = dept.total_dropped || 0;
            let droppedRow = '<tr class="plain-row"><td class="name-cell" style="color: #ef4444;">Dropped</td><td class="star-cell">-</td>';
            hourlyDropped.forEach(count => {
                const style = getRedHeatStyle(count, maxDropped);
                if (count === 0) {
                    droppedRow += `<td style="${style}">-</td>`;
                } else {
                    droppedRow += `<td style="${style}">${count}</td>`;
                }
            });
            droppedRow += `<td class="total-cell" style="background: #450a0a; color: #ef4444;">${totalDropped}</td></tr>`;
            
            // Yesterday comparison
            const yesterdayLd = dept.yesterday_ld || 0;
            const ldDiff = dept.total_ld - yesterdayLd;
            const ldDiffClass = ldDiff >= 0 ? 'positive' : 'negative';
            const ldDiffText = ldDiff >= 0 ? `+${ldDiff}` : `${ldDiff}`;
            
            return `
                <div class="heatmap-section">
                    <div class="heatmap-title">Locked Down by Hour per Intaker</div>
                    <div class="heatmap-wrapper">
                        <table class="heatmap-table">
                            <thead>${headerRow}</thead>
                            <tbody>${bodyRows}${totalsRow}${cameInRow}${droppedRow}</tbody>
                        </table>
                    </div>
                    <div style="font-size: 10px; color: #666; margin-top: 8px; text-align: left;">
                        * = LD per hour worked &nbsp;|&nbsp; 
                        <span style="color: #fff;">White #</span> = LD during shift &nbsp;|&nbsp; 
                        <span style="color: #fbbf24;">Yellow #</span> = LD outside shift &nbsp;|&nbsp; 
                        <span style="color: #ef4444;">X</span> = On shift, 0 LDs &nbsp;|&nbsp; 
                        <span style="color: #666;">-</span> = Not scheduled
                    </div>
                </div>
                
                <div class="dept-summary">
                    <div class="dept-summary-title">Intake Department</div>
                    <div class="dept-stats">
                        <div class="dept-stat">
                            <span class="dept-stat-label">Total LD:</span>
                            <span class="dept-stat-value">${dept.total_ld}</span>
                        </div>
                        <div class="dept-stat">
                            <span class="dept-stat-label">LD/Scheduled Hr:</span>
                            <span class="dept-stat-value" style="color: #4ade80; font-size: 16px;">${(dept.total_ld / (dept.total_shift_hours || 1)).toFixed(2)}</span>
                        </div>
                        <div class="dept-stat">
                            <span class="dept-stat-label">LD/Worked Hr:</span>
                            <span class="dept-stat-value" style="color: #5BA4B5; font-size: 16px;">${dept.rate_worked.toFixed(2)}</span>
                        </div>
                        <div class="dept-stat">
                            <span class="dept-stat-label">Specialists:</span>
                            <span class="dept-stat-value">${dept.specialists_count} (${dept.specialists_with_ld} with LD)</span>
                        </div>
                        <div class="dept-stat">
                            <span class="dept-stat-label">Hours:</span>
                            <span class="dept-stat-value">${dept.total_hours_worked} worked of ${dept.total_shift_hours} scheduled</span>
                        </div>
                        <div class="dept-stat">
                            <span class="dept-stat-label">Projected Rate:</span>
                            <span class="dept-stat-value">${dept.rate_shift.toFixed(2)}/hr shift</span>
                        </div>
                        <div class="dept-stat">
                            <span class="dept-stat-label">vs Yesterday:</span>
                            <span class="dept-stat-value ${ldDiffClass}">${ldDiffText} (${yesterdayLd} total)</span>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderDashboard(data) {
            const dateObj = new Date(data.date + 'T12:00:00');
            const formattedDate = dateObj.toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            
            const reps = data.reps || [];
            const totalLD = reps.reduce((sum, r) => sum + r.ld, 0);
            const totalHours = reps.reduce((sum, r) => sum + r.hours, 0);
            const teamAvg = totalHours > 0 ? (totalLD / totalHours).toFixed(2) : '0.00';
            const eliteCount = reps.filter(r => r.rate >= 1.0).length;
            
            const tabs = `
                <div class="tabs">
                    <a href="index.html" class="tab active">Dashboard</a>
                    <a href="admin.html#daily" class="tab">Manage Shifts</a>
                </div>
            `;
            
            // Empty state
            if (reps.length === 0) {
                document.getElementById('app').innerHTML = `
                    <div class="header">
                        <h1>1-800-NO-FAULT</h1>
                        <h2>INTAKE EFFICIENCY REPORT</h2>
                        <div class="date">${formattedDate}</div>
                    </div>
                    ${tabs}
                    <div class="empty-state">
                        <h3>No Data Yet</h3>
                        <p>Waiting for intake specialists to lock down cases today.</p>
                        <p style="margin-top: 10px; color: #555;">Refreshes every 15 minutes</p>
                    </div>
                `;
                return;
            }
            
            const maxRate = Math.max(...reps.map(r => r.rate), 1.5);
            const scaleMax = Math.min(maxRate * 1.1, 2.0);
            
            let barsHtml = reps.map(rep => {
                const barWidth = Math.max((rep.rate / scaleMax) * 100, 5);
                const barClass = getBarClass(rep.rate);
                return `
                    <div class="bar-row">
                        <div class="bar-name">${rep.name}</div>
                        <div class="bar-track">
                            <div class="bar-fill ${barClass}" style="width: ${barWidth}%">
                                ${rep.rate.toFixed(2)}
                            </div>
                        </div>
                        <div class="bar-stats">${rep.ld} LD | ${rep.hours}h</div>
                    </div>
                `;
            }).join('');
            
            const updatedTime = data.updated ? new Date(data.updated).toLocaleTimeString() : '';
            
            const dept = data.dept || data.department || {
                total_ld: totalLD,
                total_shift_hours: totalHours,
                total_hours_worked: totalHours,
                specialists_count: reps.length,
                specialists_with_ld: reps.filter(r => r.ld > 0).length,
                rate_worked: parseFloat(teamAvg),
                rate_shift: parseFloat(teamAvg),
                hourly_totals: new Array(17).fill(0),
                yesterday_ld: 0
            };
            const heatmapHtml = renderHeatmap(reps, dept);
            
            document.getElementById('app').innerHTML = `
                <div class="header">
                    <h1>1-800-NO-FAULT</h1>
                    <h2>INTAKE EFFICIENCY REPORT</h2>
                    <div class="date">${formattedDate} | ${totalLD} Total LD</div>
                </div>
                
                ${tabs}
                
                ${heatmapHtml}
                
                <!-- LD/Hour Performance bars hidden for now
                <div class="section-divider">
                    <div class="section-title">LD/Hour Performance</div>
                </div>
                
                <div class="chart-area">
                    ${barsHtml}
                </div>
                -->
                
                <div class="footer">
                    <div class="summary-box">
                        <div class="line"><span class="value">TOTAL LD: ${totalLD}</span></div>
                        <div class="line">TEAM AVG: <span class="value">${teamAvg}/hr</span></div>
                        <div class="line"><span class="elite-count">ELITE (1.0+): ${eliteCount}</span></div>
                    </div>
                    
                    <div class="legend">
                        <div class="legend-item"><span class="legend-dot elite"></span> 1.0+ Elite</div>
                        <div class="legend-item"><span class="legend-dot solid"></span> 0.6-1.0 Solid</div>
                        <div class="legend-item"><span class="legend-dot average"></span> 0.4-0.6 Average</div>
                        <div class="legend-item"><span class="legend-dot below"></span> &lt;0.4 Below</div>
                    </div>
                </div>
                
                <div class="updated">Last updated: ${updatedTime}</div>
            `;
        }
        
        fetchData();
        setInterval(fetchData, 300000);
    </script>
</body>
</html>
