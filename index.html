<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intake Efficiency Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 0;
        }
        
        .header h2 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .header .date {
            font-size: 14px;
            color: #888;
        }
        
        .chart-area {
            position: relative;
            padding-top: 30px;
        }
        
        .target-line {
            position: absolute;
            top: 0;
            bottom: 80px;
            width: 2px;
            background: #4ade80;
            left: calc(50% + 80px);
            z-index: 10;
        }
        
        .target-label {
            position: absolute;
            top: 5px;
            left: calc(50% + 85px);
            color: #4ade80;
            font-size: 12px;
            font-weight: 600;
        }
        
        .bar-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            height: 32px;
        }
        
        .bar-name {
            width: 160px;
            text-align: right;
            padding-right: 15px;
            font-size: 14px;
            font-weight: 500;
            flex-shrink: 0;
        }
        
        .bar-track {
            flex: 1;
            height: 28px;
            position: relative;
            max-width: 500px;
        }
        
        .bar-fill {
            height: 100%;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            font-size: 14px;
            font-weight: 700;
            min-width: 50px;
            transition: width 0.5s ease;
        }
        
        .bar-fill.elite { background: #4ade80; color: #000; }
        .bar-fill.solid { background: #5BA4B5; color: #fff; }
        .bar-fill.average { background: #fbbf24; color: #000; }
        .bar-fill.below { background: #ef4444; color: #fff; }
        
        .bar-stats {
            width: 80px;
            text-align: right;
            font-size: 12px;
            color: #888;
            padding-left: 10px;
            flex-shrink: 0;
        }
        
        .footer {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }
        
        .summary-box {
            background: #1a1a1a;
            padding: 15px 20px;
            border-radius: 8px;
        }
        
        .summary-box .line {
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .summary-box .line:last-child {
            margin-bottom: 0;
        }
        
        .summary-box .value {
            font-weight: 700;
        }
        
        .summary-box .elite-count {
            color: #4ade80;
        }
        
        .legend {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 12px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        
        .legend-dot.elite { background: #4ade80; }
        .legend-dot.solid { background: #5BA4B5; }
        .legend-dot.average { background: #fbbf24; }
        .legend-dot.below { background: #ef4444; }
        
        .x-axis {
            display: flex;
            justify-content: space-between;
            margin-left: 160px;
            max-width: 500px;
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }
        
        .x-axis-label {
            text-align: center;
            margin-left: 160px;
            max-width: 500px;
            margin-top: 5px;
            font-size: 12px;
            color: #888;
            font-weight: 600;
        }
        
        .loading {
            text-align: center;
            padding: 100px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="loading">Loading...</div>
    </div>

    <script>
        async function fetchData() {
            try {
                const response = await fetch('./data.json?' + Date.now());
                if (!response.ok) throw new Error('Failed to fetch data');
                const data = await response.json();
                renderDashboard(data);
            } catch (error) {
                console.error(error);
                document.getElementById('app').innerHTML = `<div class="loading">Error loading data</div>`;
            }
        }
        
        function getBarClass(rate) {
            if (rate >= 1.0) return 'elite';
            if (rate >= 0.6) return 'solid';
            if (rate >= 0.4) return 'average';
            return 'below';
        }
        
        function renderDashboard(data) {
            const dateObj = new Date(data.date + 'T12:00:00');
            const formattedDate = dateObj.toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            
            const reps = data.reps || [];
            const totalLD = reps.reduce((sum, r) => sum + r.ld, 0);
            const totalHours = reps.reduce((sum, r) => sum + r.hours, 0);
            const teamAvg = totalHours > 0 ? (totalLD / totalHours).toFixed(2) : 0;
            const eliteCount = reps.filter(r => r.rate >= 1.0).length;
            
            // Find max rate for scaling (cap at 1.75 for display)
            const maxRate = Math.max(...reps.map(r => r.rate), 1.5);
            const scaleMax = Math.min(maxRate * 1.1, 2.0);
            
            // Target line position (1.0 on scale)
            const targetPct = (1.0 / scaleMax) * 100;
            
            let barsHtml = reps.map(rep => {
                const barWidth = (rep.rate / scaleMax) * 100;
                const barClass = getBarClass(rep.rate);
                return `
                    <div class="bar-row">
                        <div class="bar-name">${rep.name}</div>
                        <div class="bar-track">
                            <div class="bar-fill ${barClass}" style="width: ${barWidth}%">
                                ${rep.rate.toFixed(2)}
                            </div>
                        </div>
                        <div class="bar-stats">${rep.ld} LD | ${rep.hours}h</div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('app').innerHTML = `
                <div class="header">
                    <h1>1-800-NO-FAULT</h1>
                    <h2>INTAKE EFFICIENCY REPORT</h2>
                    <div class="date">${formattedDate} | ${totalLD} Total LD</div>
                </div>
                
                <div class="chart-area">
                    <div class="target-line" style="left: calc(160px + ${targetPct}% * 5)"></div>
                    <div class="target-label" style="left: calc(165px + ${targetPct}% * 5)">TARGET: 1.0</div>
                    
                    ${barsHtml}
                    
                    <div class="x-axis">
                        <span>0</span>
                        <span>0.5</span>
                        <span>1.0</span>
                        <span>1.5</span>
                    </div>
                    <div class="x-axis-label">LOCKED DOWN PER HOUR</div>
                </div>
                
                <div class="footer">
                    <div class="summary-box">
                        <div class="line"><span class="value">TOTAL LD: ${totalLD}</span></div>
                        <div class="line">TEAM AVG: <span class="value">${teamAvg}/hr</span></div>
                        <div class="line"><span class="elite-count">ELITE PERFORMERS: ${eliteCount}</span></div>
                    </div>
                    
                    <div class="legend">
                        <div class="legend-item"><span class="legend-dot elite"></span> 1.0+ ELITE</div>
                        <div class="legend-item"><span class="legend-dot solid"></span> 0.6-1.0 SOLID</div>
                        <div class="legend-item"><span class="legend-dot average"></span> 0.4-0.6 AVERAGE</div>
                        <div class="legend-item"><span class="legend-dot below"></span> <0.4 BELOW</div>
                    </div>
                </div>
            `;
        }
        
        fetchData();
    </script>
</body>
</html>
